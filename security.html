<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>מסך אבטחה - Smart Gym</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
<link rel="stylesheet" href="css/style.css">
</head>

<body class="security-page">

<div class="security-wrapper">

  <!-- Header -->
  <div class="security-header">
    <div class="live-badge"><div class="live-dot"></div>LIVE</div>
    <h1><i class="bi bi-shield-lock-fill me-2"></i>מסך אבטחה - Smart Gym</h1>
    <div class="subtitle">מעקב כניסות בזמן אמת</div>
  </div>

  <!-- Main card -->
  <div class="status-card" id="status-card">
    
    <div class="status-icon waiting" id="status-icon">
      <i class="bi bi-broadcast" id="status-icon-i"></i>
    </div>

    <div class="status-label waiting" id="status-label">ממתין לסריקה</div>
    <div class="status-sublabel" id="status-sublabel">הנח כרטיס RFID על הקורא</div>

    <div class="info-grid">
      <div class="info-box" id="box-fname">
        <div class="label">שם פרטי</div>
        <div class="value placeholder" id="val-fname">—</div>
      </div>
      <div class="info-box" id="box-lname">
        <div class="label">שם משפחה</div>
        <div class="value placeholder" id="val-lname">—</div>
      </div>
      <div class="info-box info-full" id="box-rfid">
        <div class="label">מזהה כרטיס RFID</div>
        <div class="value placeholder rfid-value" id="val-rfid">—</div>
      </div>
    </div>
  </div>

  <!-- Scan history -->
  <div class="log-section">
    <div class="log-container" id="log-container">
      <div class="log-entry" style="color:#3a4060; justify-content:center;">אין סריקות עדיין</div>
    </div>
  </div>

</div>

<!-- Clock -->
<div class="security-clock" id="clock"></div>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/12.6.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.6.0/firebase-database-compat.js"></script>
<script src="js/security.js"></script>

</body>
</html>
